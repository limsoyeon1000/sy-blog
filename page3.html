    <h2>특징</h2>
    <p>
      러시안 블루는 은빛이 도는 회색 털과 초록색 눈이 특징인 고양이입니다.
      털이 매우 부드럽고 촘촘하여 고급스러운 느낌을 줍니다.
    </p>

    <h2>성격</h2>
    <p>
      조용하고 차분한 성격을 가지고 있으며, 낯선 사람에게는 경계심을 보이기도 합니다.
      하지만 한 번 친해지면 매우 깊은 유대감을 형성합니다.
    </p>

    <h2>키울 때 주의점</h2>
    <p>
      예민한 편이라 환경 변화에 스트레스를 받을 수 있습니다.
      안정적인 환경을 유지해주는 것이 중요합니다.
    </p>
