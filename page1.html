<header>
  <h1>샴 고양이</h1>
</header>

<nav>
  <a href="index.html">홈으로</a>
</nav>

<div class="container">

  <div class="card">
    <img src="sam cat.jpg">

    <h2>특징</h2>
    <p>
      샴 고양이는 날씬한 체형과 선명한 파란 눈을 가진 대표적인 단모종 고양이입니다.
      귀, 얼굴, 발, 꼬리 부분의 색이 짙은 '포인트 컬러'가 특징입니다.
    </p>

    <h2>성격</h2>
    <p>
      매우 활발하고 사람과의 교감을 좋아합니다.
      특히 집사를 따라다니며 대화를 하듯 울음소리를 내는 경우가 많습니다.
      애교가 많고 외로움을 잘 타는 편입니다.
    </p>

    <h2>키울 때 주의점</h2>
    <p>
      혼자 있는 시간을 힘들어하기 때문에 장시간 외출이 잦은 환경에는 적합하지 않을 수 있습니다.
      대신 충분한 관심과 놀이를 제공하면 매우 좋은 반려묘가 됩니다.
    </p>

  </div>

</div>
